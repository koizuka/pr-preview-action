name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflows (actionlint + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run actionlint
        run: |
          # Pin download script to actionlint v1.7.0 commit (rather than main).
          # `curl -fsSL` fails fast on HTTP errors so a transient 5xx or rate-limit
          # response can't be silently piped into bash as an HTML error page.
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/f970a14472c1b4d576f8456884a3238aa353a288/scripts/download-actionlint.bash) 1.7.0
          ./actionlint -color -shellcheck=shellcheck

  action-schema:
    name: Validate action.yml schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate action.yml
        uses: mpalmer/action-validator@c994f427b7c42cd5ecb1bc9315cb91c3d7d72e3d # v0.9.0
        with:
          path: action.yml

  shellcheck-action:
    name: Shellcheck inline bash in action.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install PyYAML
        run: python3 -m pip install --quiet --user pyyaml==6.0.2

      - name: Extract bash steps and run shellcheck
        run: |
          python3 - <<'PY'
          import yaml, subprocess, re, tempfile, os, sys
          # Match the GitHub Actions expression syntax. Character classes
          # [{] / [}] avoid placing the literal expression token here, which
          # actionlint would otherwise try to parse as a workflow expression.
          gha_expr = re.compile(r'\$[{][{][^}]*[}][}]')
          with open('action.yml') as f:
              doc = yaml.safe_load(f)
          fail = 0
          for i, s in enumerate(doc['runs']['steps']):
              if s.get('shell') != 'bash':
                  continue
              name = s.get('name', '(unnamed)')
              # Replace GitHub expressions with a synthetic shell variable so the
              # script is parseable by shellcheck.
              body = gha_expr.sub('$GHA_EXPR', s['run'])
              script = (
                  "#!/usr/bin/env bash\n"
                  "# shellcheck disable=SC2154  # GHA_EXPR is synthetic\n"
                  + body + "\n"
              )
              with tempfile.NamedTemporaryFile('w', suffix='.sh', delete=False) as tf:
                  tf.write(script)
                  tmp = tf.name
              print(f"::group::Step {i}: {name}", flush=True)
              rc = subprocess.run(['shellcheck', tmp]).returncode
              print("::endgroup::", flush=True)
              if rc != 0:
                  fail += 1
              os.unlink(tmp)
          if fail > 0:
              print(f"::error::shellcheck found issues in {fail} step(s) of action.yml")
              sys.exit(1)
          PY

  yamllint:
    name: Lint YAML style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install yamllint
        run: pipx install yamllint==1.38.0

      - name: Run yamllint
        run: yamllint action.yml .github/workflows/

  markdownlint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: '**/*.md'

  hash-pin-check:
    name: Enforce SHA-pinned action references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Verify all uses: are pinned to a 40-char SHA"
        run: |
          set -euo pipefail
          # Match `uses: <owner>/<repo>...@<ref>` where ref is not a 40-char hex SHA.
          # Skip local action references (uses: ./...). Strip comments before matching.
          violations=$(
            grep -rEn '^[[:space:]]*-?[[:space:]]*uses:[[:space:]]+' \
              .github/workflows action.yml \
            | sed -E 's/[[:space:]]+#.*$//' \
            | grep -vE 'uses:[[:space:]]+\./' \
            | grep -E 'uses:[[:space:]]+[^[:space:]]+@[^[:space:]]+' \
            | grep -vE '@[0-9a-f]{40}([[:space:]]*$|[[:space:]])' \
            || true
          )
          if [ -n "$violations" ]; then
            echo "::error::Unpinned action references found (must be pinned by 40-char commit SHA):"
            echo "$violations"
            exit 1
          fi
          echo "All action references are SHA-pinned."

  # Aggregate result of all checks above. Configure this single job as the
  # required status check in branch protection so individual lint jobs can be
  # added or removed without re-editing the protection rule.
  all-checks:
    name: All checks passed
    if: always()
    needs:
      - actionlint
      - action-schema
      - shellcheck-action
      - yamllint
      - markdownlint
      - hash-pin-check
    runs-on: ubuntu-latest
    steps:
      - name: Verify every required job succeeded
        run: |
          set -euo pipefail
          results="${{ join(needs.*.result, ',') }}"
          echo "Upstream results: $results"
          IFS=',' read -ra arr <<< "$results"
          for r in "${arr[@]}"; do
            if [ "$r" != "success" ]; then
              echo "::error::At least one required job did not succeed (got: $r)"
              exit 1
            fi
          done
          echo "All required jobs succeeded."
